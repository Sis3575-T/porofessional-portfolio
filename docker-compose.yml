version: '3.9'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    environment:
      API_PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/portfolio
      JWT_SECRET: portfolio-pro-super-secret-jwt-key-2024
      JWT_EXPIRY: 7d
      ADMIN_EMAIL: admin@portfolio.dev
      ADMIN_PASSWORD: AdminPassword123!
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./services/api/src:/app/src
      - ./services/api/package.json:/app/package.json
      - ./prisma:/app/prisma
      - api_uploads:/app/uploads

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/package.json:/app/package.json
      - ./apps/web/index.html:/app/index.html

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    ports:
      - '5174:5174'
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - api
    volumes:
      - ./apps/admin/src:/app/src
      - ./apps/admin/package.json:/app/package.json
      - ./apps/admin/index.html:/app/index.html

volumes:
  pgdata:
  api_uploads:
