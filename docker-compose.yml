version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./services/api
    command: npm run dev
    working_dir: /app
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
    depends_on:
      - db

  web:
    build:
      context: ./apps/web
    command: npm run dev
    working_dir: /app
    ports:
      - '5173:5173'
    depends_on:
      - api

  admin:
    build:
      context: ./apps/admin
    command: npm run dev
    working_dir: /app
    ports:
      - '5174:5174'
    depends_on:
      - api

volumes:
  pgdata:
