services:
  - type: web
    name: portfolio-backend
    runtime: node
    plan: free
    buildCommand: npm install && cd services/shared && npm install && cd ../backend && npm install && npx prisma generate --schema=../../prisma/schema.prisma
    startCommand: cd services/backend && node src/server.js
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 7d
      - key: ADMIN_EMAIL
        value: sisay3575@gmail.com
      - key: FRONTEND_URL
        value: https://porofessional-portfolio-web-ri59.vercel.app
      - key: ADMIN_URL
        value: https://porofessional-portfolio-admin-ri59.vercel.app
      - key: NODE_ENV
        value: production

  - type: web
    name: portfolio-web
    runtime: node
    plan: free
    buildCommand: cd apps/web && npm install && npm run build
    startCommand: cd apps/web && npx serve -s dist -l $PORT
    envVars:
      - key: VITE_API_URL
        value: https://portfolio-s-pn8u.onrender.com
      - key: NODE_ENV
        value: production

  - type: web
    name: portfolio-admin
    runtime: node
    plan: free
    buildCommand: cd apps/admin && npm install && npm run build
    startCommand: cd apps/admin && npx serve -s dist -l $PORT
    envVars:
      - key: VITE_API_URL
        value: https://portfolio-s-pn8u.onrender.com
      - key: NODE_ENV
        value: production
