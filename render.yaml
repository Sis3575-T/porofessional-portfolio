services:
  - type: web
    name: portfolio-gateway
    runtime: docker
    dockerfilePath: services/api/Dockerfile
    envVars:
      - key: GATEWAY_PORT
        value: 5000
      - key: AUTH_SERVICE_URL
        fromService:
          name: portfolio-auth
          type: web
          property: host
      - key: PORTFOLIO_SERVICE_URL
        fromService:
          name: portfolio-content
          type: web
          property: host
      - key: MEDIA_SERVICE_URL
        fromService:
          name: portfolio-media
          type: web
          property: host
      - key: DASHBOARD_SERVICE_URL
        fromService:
          name: portfolio-dashboard
          type: web
          property: host
      - key: NODE_ENV
        value: production
    ports:
      port: 5000

  - type: web
    name: portfolio-auth
    runtime: docker
    dockerfilePath: services/auth-service/Dockerfile
    envVars:
      - key: AUTH_SERVICE_PORT
        value: 5001
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 7d
      - key: NODE_ENV
        value: production

  - type: web
    name: portfolio-content
    runtime: docker
    dockerfilePath: services/portfolio-service/Dockerfile
    envVars:
      - key: PORTFOLIO_SERVICE_PORT
        value: 5002
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 7d
      - key: ADMIN_EMAIL
        value: sisay3575@gmail.com
      - key: NODE_ENV
        value: production

  - type: web
    name: portfolio-media
    runtime: docker
    dockerfilePath: services/media-service/Dockerfile
    envVars:
      - key: MEDIA_SERVICE_PORT
        value: 5003
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  - type: web
    name: portfolio-dashboard
    runtime: docker
    dockerfilePath: services/dashboard-service/Dockerfile
    envVars:
      - key: DASHBOARD_SERVICE_PORT
        value: 5004
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 7d
      - key: NODE_ENV
        value: production

  - type: web
    name: portfolio-web
    runtime: docker
    dockerfilePath: apps/web/Dockerfile
    envVars:
      - key: VITE_API_URL
        fromService:
          name: portfolio-gateway
          type: web
          property: host
    ports:
      port: 5175

  - type: web
    name: portfolio-admin
    runtime: docker
    dockerfilePath: apps/admin/Dockerfile
    envVars:
      - key: VITE_API_URL
        fromService:
          name: portfolio-gateway
          type: web
          property: host
    ports:
      port: 5174
